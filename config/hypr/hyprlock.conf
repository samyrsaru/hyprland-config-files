general {
    ignore_empty_input = true
    fail_timeout = 500
    #immediate_render = true
}

background {
    monitor =
    path = screenshot   # Takes a screenshot of current desktop
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 4
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.2)
    outer_color = rgba(255, 255, 255, 0.8)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    rounding = 25
    check_color = rgba(100, 255, 100, 0.8)
    fail_color = rgba(255, 100, 100, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    fail_transitions = 300
    check_password_immediate = true

    position = 0, -80
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 75
    font_family = JetBrains Mono

    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrains Mono

    position = 0, 15
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:300000] echo "$(shuf -n1 <<< $'Hey Sam!\nReady when you are\nThese violent delights have violent ends\nWelcome back\nGood to see you\nTime to get to work\nLet\\'s go\nBack in business\nHere we go again\nWhat\\'s the plan today?')"
    color = rgba(200, 200, 200, 0.9)
    font_size = 24
    font_family = JetBrains Mono

    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] echo "Battery: $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo 'N/A')%"
    color = rgba(255, 255, 255, 0.4)
    font_size = 14
    font_family = JetBrains Mono

    position = 0, -120
    halign = center
    valign = center
}

